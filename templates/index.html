<h1>🌊 Flood Prediction</h1>

<form action="/predict" method="post">

    <input type="text" name="rainfall" placeholder="Enter Rainfall" required>
    <input type="text" name="temperature" placeholder="Enter Temperature" required>

    <!-- 🌍 City input -->
    <input type="text" name="city" placeholder="Enter City (optional)">

    <button type="submit">Predict</button>
</form>

{% if prediction_text %}
    <h3>{{ prediction_text }}</h3>
    <img src="{{ url_for('static', filename='graph.png') }}" width="300">
{% endif %}
